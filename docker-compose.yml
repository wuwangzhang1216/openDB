version: "3.9"
services:
  filedb:
    build: .
    ports:
      - "8000:8000"
    environment:
      FILEDB_DATABASE_URL: postgresql://opendb:opendb@postgres:5432/opendb
      FILEDB_FILE_STORAGE_PATH: /data
    volumes:
      - filedata:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: opendb
      POSTGRES_PASSWORD: opendb
      POSTGRES_DB: opendb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendb"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pgdata:
  filedata:
